name: 🧪 OpenClaw 功能测试

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: 📦 Install OpenClaw
      run: |
        npm install -g openclaw
        openclaw --version
    
    - name: 🚀 Test
      run: |
        echo "✅ OpenClaw 测试成功"
        date > test-result.txt
        cat test-result.txt
    
    - name: 💾 Commit
      run: |
        git config user.name "OpenClaw Bot"
        git config user.email "bot@github.com"
        git add .
        git commit -m "test: $(date '+%Y-%m-%d')" || echo "No changes"
        git push
